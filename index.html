<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipBook - PDF to Flipbook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        h1 {
            margin: 30px 0 10px;
            font-size: 2rem;
            color: #e94560;
        }
        .upload-area {
            border: 3px dashed #e94560;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            width: 90%;
            max-width: 500px;
            margin: 20px 0;
        }
        .upload-area:hover {
            background: rgba(233, 69, 96, 0.1);
        }
        #fileInput {
            display: none;
        }
        .book-container {
            width: 90%;
            max-width: 800px;
            height: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            margin: 20px 0;
            display: none;
        }
        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid #ddd;
            overflow: hidden;
        }
        .page img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #e94560;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #c73e54;
            transform: scale(1.05);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .page-num {
            color: #e94560;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 0;
        }
        .loading {
            color: #e94560;
            font-size: 1.2rem;
            margin: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>📖 FlipBook</h1>
    <p>Upload a PDF and read it like a real book</p>
    
    <div class="upload-area" id="uploadArea">
        <p>📁 Click to Upload PDF</p>
        <p style="font-size: 0.8rem; color: #aaa;">Or drag and drop here</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf">
    
    <div class="loading" id="loading">Processing PDF...</div>
    
    <div class="book-container" id="book">
        <button id="prevBtn" style="position: absolute; left: 10px; z-index: 10; background: rgba(0,0,0,0.5);">◀</button>
        <div class="page" id="leftPage">
            <p style="color: #999;">Upload a PDF to start</p>
        </div>
        <div class="page" id="rightPage">
            <p style="color: #999;">Upload a PDF to start</p>
        </div>
        <button id="nextBtn" style="position: absolute; right: 10px; z-index: 10; background: rgba(0,0,0,0.5);">▶</button>
    </div>
    
    <p class="page-num" id="pageIndicator">Page 0 / 0</p>
    
    <div class="controls">
        <button id="prevBtn2">◀ Previous</button>
        <button id="nextBtn2">Next ▶</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Set PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let pageImages = [];
        
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const book = document.getElementById('book');
        const leftPage = document.getElementById('leftPage');
        const rightPage = document.getElementById('rightPage');
        const pageIndicator = document.getElementById('pageIndicator');
        const loading = document.getElementById('loading');
        
        // Upload click
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'rgba(233, 69, 96, 0.2)';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = 'transparent';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'transparent';
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                handleFile(file);
            }
        });
        
        // File selected
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });
        
        async function handleFile(file) {
            loading.style.display = 'block';
            
            const reader = new FileReader();
            reader.onload = async function() {
                const typedArray = new Uint8Array(reader.result);
                pdfDoc = await pdfjsLib.getDocument(typedArray).promise;
                totalPages = pdfDoc.numPages;
                pageImages = [];
                
                // Render all pages to images
                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdfDoc.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    pageImages.push(canvas.toDataURL());
                }
                
                loading.style.display = 'none';
                book.style.display = 'flex';
                currentPage = 1;
                renderPages();
            };
            reader.readAsArrayBuffer(file);
        }
        
        function renderPages() {
            // Show two pages side by side
            const leftIdx = currentPage - 1;
            const rightIdx = currentPage;
            
            if (leftIdx < pageImages.length) {
                leftPage.innerHTML = `<img src="${pageImages[leftIdx]}" alt="Page ${currentPage}">`;
            } else {
                leftPage.innerHTML = '<p style="color: #999;">End of book</p>';
            }
            
            if (rightIdx < pageImages.length) {
                rightPage.innerHTML = `<img src="${pageImages[rightIdx]}" alt="Page ${currentPage + 1}">`;
            } else {
                rightPage.innerHTML = '<p style="color: #999;">End of book</p>';
            }
            
            pageIndicator.textContent = `Page ${currentPage} - ${Math.min(currentPage + 1, totalPages)} / ${totalPages}`;
            
            // Update button states
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('prevBtn2').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
            document.getElementById('nextBtn2').disabled = currentPage >= totalPages - 1;
        }
        
        // Navigation
        function nextPage() {
            if (currentPage < totalPages - 1) {
                currentPage += 2;
                renderPages();
            }
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage -= 2;
                renderPages();
            }
        }
        
        document.getElementById('nextBtn').addEventListener('click', nextPage);
        document.getElementById('nextBtn2').addEventListener('click', nextPage);
        document.getElementById('prevBtn').addEventListener('click', prevPage);
        document.getElementById('prevBtn2').addEventListener('click', prevPage);
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });
    </script>
</body>
</html>
